---
- name: Прокидка ssh ключа с VM1 на VM2
  import_tasks: ssh_copy_id.yml

- name: Установка OVPN Через SSH 
  import_tasks: in_ovpn.yml

- name: Создание директории для сертификатов
  file:
    path: /etc/openvpn/client
    state: directory
    mode: '0755'

- name: Копирование сертификатов с control node
  copy:
    src: "{{ playbook_dir }}/files/certs/{{ item }}"
    dest: "/etc/openvpn/client/{{ item }}"
    mode: '0600'
  loop:
    - ca.crt
    - client.crt
    - client.key
    - ta.key

- name: Настройка OpenVPN клиента
  template:
    src: client.conf.j2
    dest: /etc/openvpn/client.conf
    mode: '0644'
  notify: restart openvpn-client

- name: Скрипт для обновления DNS
  template:
    src: update-resolv-conf.sh.j2
    dest: /etc/openvpn/update-resolv-conf
    mode: '0755'

- name: Запуск OpenVPN клиента
  systemd:
    name: openvpn@client
    enabled: yes
    state: started

- name: Ожидание поднятия VPN
  wait_for:
    host: "{{ vpn_server_ip }}"
    port: 1194
    delay: 10
    timeout: 60
  register: vpn_check
  retries: 3
  until: vpn_check is success

