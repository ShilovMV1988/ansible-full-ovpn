- name: Скрипт для обновления DNS
  template:
    src: update-resolv-conf.sh.j2
    dest: /etc/openvpn/update-resolv-conf
    mode: '0755'

- name: Запуск OpenVPN клиента
  systemd:
    name: openvpn-client@client #если бы конфиг располагался в старой папке  то сервис назывался бы  openvpn@client
    enabled: yes
    state: started

